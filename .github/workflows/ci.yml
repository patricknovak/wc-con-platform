name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: apps/web
        run: npx next build
        env:
          GITHUB_PAGES: 'true'
